services:
  - type: web
    name: ai-customer-support-triage-response-backend
    env: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: APP_ENV
        value: staging
      - key: DEBUG
        value: "false"
      - key: API_CORS_ORIGINS
        value: https://ai-customer-support-triage-response.vercel.app
      - key: FRONTEND_ORIGIN
        value: https://ai-customer-support-triage-response.vercel.app
      - key: LOGGING_LEVEL
        value: INFO
      - key: ERROR_TRACKING_DSN
        sync: false
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "false"
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: SYNC_FALLBACK_INTERVAL_MINUTES
        value: "15"
      - key: WATCH_RENEWAL_SCHEDULE
        value: "0 3 * * *"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: support-triage-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://ai-customer-support-triage-response.onrender.com/v1/gmail/oauth/callback
      - key: GOOGLE_CLOUD_PROJECT_ID
        value: customer-support-triage-501408
      - key: GOOGLE_PUBSUB_TOPIC
        value: projects/customer-support-triage-501408/topics/gmail-notifications
      - key: GOOGLE_PUBSUB_SUBSCRIPTION
        value: gmail-notifications-sub
      - key: PUBSUB_EXPECTED_AUDIENCE
        value: https://ai-customer-support-triage-response.onrender.com/v1/webhooks/google/gmail
      - key: PUBSUB_SERVICE_ACCOUNT_EMAIL
        value: pub-sub-push-invoker@customer-support-triage-501408.iam.gserviceaccount.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: AUTH_ALLOW_UNVERIFIED_JWT
        value: "false"

  - type: worker
    name: ai-customer-support-triage-response-worker
    env: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: staging
      - key: DEBUG
        value: "false"
      - key: API_CORS_ORIGINS
        value: https://ai-customer-support-triage-response.vercel.app
      - key: FRONTEND_ORIGIN
        value: https://ai-customer-support-triage-response.vercel.app
      - key: LOGGING_LEVEL
        value: INFO
      - key: ERROR_TRACKING_DSN
        sync: false
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "false"
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: SYNC_FALLBACK_INTERVAL_MINUTES
        value: "15"
      - key: WATCH_RENEWAL_SCHEDULE
        value: "0 3 * * *"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: support-triage-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://ai-customer-support-triage-response.onrender.com/v1/gmail/oauth/callback
      - key: GOOGLE_CLOUD_PROJECT_ID
        value: customer-support-triage-501408
      - key: GOOGLE_PUBSUB_TOPIC
        value: projects/customer-support-triage-501408/topics/gmail-notifications
      - key: GOOGLE_PUBSUB_SUBSCRIPTION
        value: gmail-notifications-sub
      - key: PUBSUB_EXPECTED_AUDIENCE
        value: https://ai-customer-support-triage-response.onrender.com/v1/webhooks/google/gmail
      - key: PUBSUB_SERVICE_ACCOUNT_EMAIL
        value: pub-sub-push-invoker@customer-support-triage-501408.iam.gserviceaccount.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: AUTH_ALLOW_UNVERIFIED_JWT
        value: "false"

  - type: redis
    name: support-triage-redis
    ipAllowList: []
